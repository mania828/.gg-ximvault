<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>darkness.icu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #eaeaea;
      font-family: "Courier New", monospace;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* BACKGROUND LAYER */
    #background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      /* Add your background image path here */
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                  url('https://cdn.discordapp.com/attachments/1504656413740240986/1504876760737648811/ssstik.io_1778858412639.mp4?ex=6a089533&is=6a0743b3&hm=3d2097713a85d60cec38fb66112cc5ce42e468dd9619d08db18db03bbf59bc69&');
      background-size: cover;
      background-position: center;
      display: none;
    }

    /* ENTRY - EXACTLY FROM lol.html */
    #entry {
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      opacity: 0.85;
      z-index: 10;
    }

    /* PAYLOAD - CENTERED ALIGNMENT */
    #payload {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 5;
    }

    #info {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      display: inline-block;
      text-align: left; /* Keeps the terminal look aligned left while the block is centered */
    }

    .hidden {
      display: none !important;
    }

    /* TYPEWRITER CURSOR */
    #info::after {
      content: "█";
      animation: blink 1s step-start infinite;
      margin-left: 5px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* FOOTER - EXACTLY FROM lol.html */
    #footer {
      position: fixed;
      bottom: 20px;
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
    }

    #fog {
      cursor: pointer;
      text-decoration: underline;
    }

    #info img {
      width: 18px;
      height: auto;
      vertical-align: middle;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <div id="background"></div>

  <div id="entry">
    darkness.icu
  </div>

  <div id="payload" class="hidden">
    <pre id="info"></pre>
  </div>

  <div id="footer">
    © 2026 <span id="fog">6fog.lol</span>
  </div>

  <audio id="music" src="song.mp3" loop></audio>

  <script>
    const entry = document.getElementById("entry");
    const payload = document.getElementById("payload");
    const info = document.getElementById("info");
    const music = document.getElementById("music");
    const fog = document.getElementById("fog");
    const bg = document.getElementById("background");

    let started = false;

    fog.onclick = (e) => {
      e.stopPropagation();
      window.location.href = "https://6fog.lol";
    };

    function typeWriter(text, i = 0) {
      if (i < text.length) {
        info.textContent += text.charAt(i);
        setTimeout(() => typeWriter(text, i + 1), 25);
      }
    }

    document.body.onclick = async () => {
      if (started) return;
      started = true;

      bg.style.display = "block";
      entry.classList.add("hidden");
      payload.classList.remove("hidden");
      
      music.play().catch(() => console.log("Audio requires interaction."));

      try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        
        const now = new Date();
        const time = now.toLocaleString("en-GB", { hour12: false });

        const content = `Welcome To Darkness
-------- TIME -------
${time}
------- DEVICE & BROWSER -------
${navigator.platform} & ${navigator.userAgent.split(") ")[0]})
------- IPDATA -------
IP Address: ${data.ip}
Country: ${data.country_name}
Location: ${data.city}, ${data.region}
Provider: ${data.org}
------- LOCATION -------
Continent: ${data.continent_code}
Postal Code: ${data.postal}
Coordinates: ${data.latitude}, ${data.longitude}
Timezone: ${data.timezone}
Currency: ${data.currency}
Language: ${navigator.language}
------- SECURITY -------
Tor: No
Proxy: No
----- END -----`;

        typeWriter(content);
      } catch (error) {
        const fallback = `ERROR: OFFLINE MODE\n------------------\nTIME: ${new Date().toLocaleString()}\nPLATFORM: ${navigator.platform}`;
        typeWriter(fallback);
      }
    };
  </script>
</body>
</html>
